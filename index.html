<section id="screen" class="test-section">
    <div class="grid grid-cols-4 gap-4 max-w-2xl">
        <div onclick="openScreen('#fff')" class="w-24 h-24 bg-white rounded-xl cursor-pointer hover:scale-105 transition-transform border border-slate-700"></div>
        <div onclick="openScreen('#000')" class="w-24 h-24 bg-black rounded-xl cursor-pointer hover:scale-105 transition-transform border border-slate-700"></div>
        <div onclick="openScreen('#f00')" class="w-24 h-24 bg-red-600 rounded-xl cursor-pointer hover:scale-105 transition-transform"></div>
        <div onclick="openScreen('#0f0')" class="w-24 h-24 bg-green-600 rounded-xl cursor-pointer hover:scale-105 transition-transform"></div>
        <div onclick="openScreen('#00f')" class="w-24 h-24 bg-blue-600 rounded-xl cursor-pointer hover:scale-105 transition-transform"></div>
        <div onclick="openScreen('#ff0')" class="w-24 h-24 bg-yellow-400 rounded-xl cursor-pointer hover:scale-105 transition-transform"></div>
        <div onclick="openScreen('#f0f')" class="w-24 h-24 bg-fuchsia-600 rounded-xl cursor-pointer hover:scale-105 transition-transform"></div>
        <div onclick="openScreen('#0ff')" class="w-24 h-24 bg-cyan-500 rounded-xl cursor-pointer hover:scale-105 transition-transform"></div>
        <div onclick="openScreen('linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff)')" class="col-span-4 h-16 w-full rounded-xl cursor-pointer hover:scale-[1.02] transition-transform bg-gradient-to-r from-red-500 via-green-500 to-blue-500 border border-white/20 flex items-center justify-center font-bold text-[10px] uppercase">Test Dải Màu Gradient</div>
    </div>
</section>

<section id="mic" class="test-section">
    <div class="w-full max-w-xl glass p-8 rounded-[2rem] text-center">
        <h3 class="text-xl font-black italic text-green-400 mb-8 uppercase tracking-widest">Kiểm tra Micro</h3>
        <div class="w-full h-8 bg-slate-900 rounded-full overflow-hidden border border-white/5 relative mb-6">
            <div id="mic-bar" class="h-full bg-gradient-to-r from-green-500 to-red-500 transition-all duration-75" style="width: 0%"></div>
        </div>
        <div id="m-status" class="text-4xl font-black text-white">0%</div>
        <button onclick="startMic()" class="mt-10 bg-green-600 px-12 py-4 rounded-full font-black uppercase text-sm shadow-lg shadow-green-900/20 active:scale-95 transition-all">Bắt đầu thử Mic</button>
    </div>
</section>

<script>
    async function startMic() {
        const s = await navigator.mediaDevices.getUserMedia({audio:true});
        const ctx = new AudioContext(); 
        const ana = ctx.createAnalyser();
        ctx.createMediaStreamSource(s).connect(ana);
        const data = new Uint8Array(ana.frequencyBinCount);
        
        const loop = () => {
            ana.getByteFrequencyData(data);
            // Lấy giá trị trung bình cường độ
            let sum = 0;
            for(let i=0; i<data.length; i++) sum += data[i];
            let v = Math.round((sum / data.length) * 2); // Hệ số khuếch đại
            v = Math.min(100, v); // Giới hạn tối đa 100%
            
            document.getElementById('mic-bar').style.width = v + "%";
            document.getElementById('m-status').innerText = v + "%";
            requestAnimationFrame(loop);
        }; 
        loop();
    }
</script>
